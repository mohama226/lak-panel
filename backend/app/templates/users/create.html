{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Create User</h1>
        <p>Create a new VPN user</p>
    </div>

    <a href="/users" class="btn btn-secondary">
        ← Back
    </a>
</div>

<div class="dashboard-box">

    <div class="box-header">
        <h3>New User</h3>
    </div>

    <div class="box-content">

        <form id="createUserForm">

            <label>Username</label>
            <input
                type="text"
                id="username"
                required
            >

            <label>Password</label>
            <input
                type="text"
                id="password"
                required
            >

            <label>Traffic (GB)</label>
            <input
                type="number"
                id="traffic"
                value="0"
            >

            <label>Expire</label>
            <input
                type="date"
                id="expire"
            >

            <button
                type="submit"
                class="btn-primary"
            >
                Create User
            </button>

        </form>

    </div>

</div>

<script>

document
.getElementById("createUserForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const res=await fetch("/users",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:username.value,

password:password.value,

traffic:Number(traffic.value),

expire:expire.value||null

})

});

if(res.ok){

location="/users";

}else{

const data=await res.json();

alert(data.detail||"Error");

}

});

</script>

{% endblock %}
