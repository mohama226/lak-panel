{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <div>
        <h1>Create User</h1>
        <p>Create new VPN account</p>
    </div>

</div>

<div class="settings-card">

<form id="createUserForm">

<label>Username</label>
<input
type="text"
name="username"
required
>

<label>Password</label>
<input
type="text"
name="password"
required
>

<label>Traffic (GB)</label>
<input
type="number"
name="traffic"
value="0"
>

<label>Expire</label>
<input
type="datetime-local"
name="expire"
>

<button
class="save-btn"
type="submit"
>
Create User
</button>

</form>

<div
id="result"
style="margin-top:20px;"
></div>

</div>

<script>

document
.getElementById("createUserForm")
.addEventListener("submit",async(e)=>{

e.preventDefault()

const fd=new FormData(e.target)

const body={

username:fd.get("username"),

password:fd.get("password"),

traffic:Number(fd.get("traffic")),

expire:fd.get("expire")||null

}

const r=await fetch("/users",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(body)

})

const j=await r.json()

const box=document.getElementById("result")

if(r.ok){

box.innerHTML=`<div class="alert alert-success">${j.detail}</div>`

e.target.reset()

}else{

box.innerHTML=`<div class="alert alert-danger">${j.detail}</div>`

}

})

</script>

{% endblock %}
