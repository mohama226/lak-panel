<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>LAK Panel Login</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="login-box">

<h1>LAK PANEL</h1>

<form method="post" action="/login">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

</div>

</body>

</html>
