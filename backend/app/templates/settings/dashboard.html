<div class="settings-card">

    <h3>
        Dashboard Auto Refresh
    </h3>

    <form
        id="dashboard-settings-form">

        <div class="form-group">

            <label>

                <input
                    id="dashboard_auto_refresh"
                    type="checkbox"
                    {% if dashboard.auto_refresh %}
                    checked
                    {% endif %}
                >

                Enable Auto Refresh

            </label>

        </div>

        <div class="form-group">

            <label>

                Refresh Interval (Seconds)

            </label>

            <select
                id="dashboard_refresh_interval">

                {% for i in [1,2,3,5,10,15,30,60] %}

                <option
                    value="{{ i }}"
                    {% if dashboard.refresh_interval==i %}
                    selected
                    {% endif %}
                >

                    {{ i }} Seconds

                </option>

                {% endfor %}

            </select>

        </div>

        <button
            class="btn btn-primary"
            type="submit">

            Save Settings

        </button>

    </form>

</div>

<script src="/static/js/settings.js"></script>
