{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>⚙ Panel Settings</h1>
    <p>General panel configuration</p>
</div>

<form action="/settings/dashboard" method="post">

    <div class="dashboard-card">

        <h2 style="margin-bottom:20px;">
            Dashboard Auto Refresh
        </h2>

        <div style="margin-bottom:20px;">

            <label>

                <input
                    type="checkbox"
                    name="auto_refresh"
                    {% if dashboard.auto_refresh %}checked{% endif %}
                >

                Enable Auto Refresh

            </label>

        </div>

        <div style="margin-bottom:20px;">

            <label>

                Refresh Interval

            </label>

            <select name="refresh_interval">

                <option value="1"
                {% if dashboard.refresh_interval==1 %}selected{% endif %}>
                    Every 1 second
                </option>

                <option value="2"
                {% if dashboard.refresh_interval==2 %}selected{% endif %}>
                    Every 2 seconds
                </option>

                <option value="5"
                {% if dashboard.refresh_interval==5 %}selected{% endif %}>
                    Every 5 seconds
                </option>

                <option value="10"
                {% if dashboard.refresh_interval==10 %}selected{% endif %}>
                    Every 10 seconds
                </option>

                <option value="30"
                {% if dashboard.refresh_interval==30 %}selected{% endif %}>
                    Every 30 seconds
                </option>

                <option value="60"
                {% if dashboard.refresh_interval==60 %}selected{% endif %}>
                    Every 60 seconds
                </option>

            </select>

        </div>

        <button type="submit">

            💾 Save Settings

        </button>

    </div>

</form>

{% endblock %}
