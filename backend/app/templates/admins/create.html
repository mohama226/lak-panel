{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>Create Admin</h1>

    <p>Add a new administrator</p>

</div>

{% if error %}

<div class="error">

    {{ error }}

</div>

<br>

{% endif %}

<form method="post" action="/admins/create">

    <label>

        Username

    </label>

    <input
        type="text"
        name="username"
        required
    >

    <label>

        Full Name

    </label>

    <input
        type="text"
        name="fullname"
        required
    >

    <label>

        Password

    </label>

    <input
        type="password"
        name="password"
        required
    >

    <label>

        Role

    </label>

    <select
        name="role_id"
        required
    >

        {% for role in roles %}

            <option value="{{ role.id }}">

                {{ role.name }}

            </option>

        {% endfor %}

    </select>

    <br>

    <button type="submit">

        Create Admin

    </button>

    <a href="/admins">

        <button type="button">

            Cancel

        </button>

    </a>

</form>

{% endblock %}
