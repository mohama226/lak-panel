{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>Edit Admin</h1>

    <p>Edit administrator information</p>

</div>

{% if error %}

<div class="error">

{{ error }}

</div>

<br>

{% endif %}

<form method="post">

<label>Username</label>

<input
type="text"
name="username"
value="{{ admin.username }}"
required>

<label>Full Name</label>

<input
type="text"
name="fullname"
value="{{ admin.fullname }}"
required>

<label>New Password</label>

<input
type="password"
name="password"
placeholder="Leave empty if unchanged">

<label>Role</label>

<select name="role_id">

{% for role in roles %}

<option
value="{{ role.id }}"
{% if admin.role_id==role.id %}
selected
{% endif %}
>

{{ role.name }}

</option>

{% endfor %}

</select>

<label>

<input
type="checkbox"
name="active"
{% if admin.active %}
checked
{% endif %}
>

Active

</label>

<br><br>

<button type="submit">

Save Changes

</button>

<a href="/admins">

<button type="button">

Cancel

</button>

</a>

</form>

{% endblock %}
