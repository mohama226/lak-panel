<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>L-Panel</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:tahoma;
        }

        body{
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#1e293b;
            padding:40px;
            border-radius:12px;
            text-align:center;
            width:500px;
            box-shadow:0 0 25px rgba(0,0,0,.3);
        }

        h1{
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:18px;
        }
    </style>

</head>

<body>

<div class="card">

<h1>L-Panel</h1>

<p>نسخه اولیه با موفقیت اجرا شد ✅</p>

</div>

</body>
</html>
